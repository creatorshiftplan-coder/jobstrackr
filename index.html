<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobsTrackr - Your Government Job Tracker</title>
  <meta name="description"
    content="Track government job exams, manage applications, and stay updated with JobsTrackr - India's smartest government job tracking app" />
  <meta name="author" content="JobsTrackr" />
  <meta name="keywords"
    content="government jobs, sarkari naukri, exam tracker, UPSC, SSC, Railway jobs, banking exams, India jobs" />

  <!-- Robots & Indexing -->
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://jobstrackr.in" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0A4174" />
  <meta name="msapplication-TileColor" content="#0A4174" />

  <!-- Favicon - Comprehensive setup for Google Search -->
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="JobsTrackr - Smart App for Smart Aspirants" />
  <meta property="og:description"
    content="Track government job exams, manage applications, and stay updated with JobsTrackr - India's smartest government job tracking app" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jobstrackr.in" />
  <meta property="og:site_name" content="JobsTrackr" />
  <meta property="og:locale" content="en_IN" />
  <meta property="og:image" content="https://jobstrackr.in/og-image.png" />
  <meta property="og:image:secure_url" content="https://jobstrackr.in/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="JobsTrackr - Smart App for Smart Aspirants" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="JobsTrackr - Smart App for Smart Aspirants" />
  <meta name="twitter:description"
    content="Track government job exams, manage applications, and stay updated with JobsTrackr" />
  <meta name="twitter:image" content="https://jobstrackr.in/og-image.png" />

  <!-- JSON-LD Structured Data for Google -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "name": "JobsTrackr",
          "url": "https://jobstrackr.in",
          "logo": "https://jobstrackr.in/logo.png",
          "description": "Track government job exams, manage applications, and stay updated with JobsTrackr - India's smartest government job tracking app",
          "applicationCategory": "UtilitiesApplication",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "INR"
          }
        },
        {
          "@type": "Organization",
          "name": "JobsTrackr",
          "url": "https://jobstrackr.in",
          "logo": "https://jobstrackr.in/logo.png",
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "contact@jobstrackr.in",
            "contactType": "customer support"
          }
        },
        {
          "@type": "WebSite",
          "name": "JobsTrackr",
          "url": "https://jobstrackr.in",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://jobstrackr.in/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
</head>

<body>
  <div id="root">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff">
      <div
        style="width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#0A4174;border-radius:50%;animation:_s .8s linear infinite">
      </div>
    </div>
    <style>
      @keyframes _s {
        to {
          transform: rotate(360deg)
        }
      }
    </style>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
